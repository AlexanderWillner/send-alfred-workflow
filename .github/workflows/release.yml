name: Release
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd "Send via ffsend" && zip -r "../Send-v${GITHUB_REF_NAME#v}.alfredworkflow" . -x "*.DS_Store"
      - uses: softprops/action-gh-release@v2
        with:
          files: Send-v${{ github.ref_name }}.alfredworkflow
